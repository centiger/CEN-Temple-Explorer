<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#070503" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CEN Temple Explorer" />
  <title>CEN Temple Explorer</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./assets/common/icons/icon-192.png" />
  <link rel="stylesheet" href="./assets/common/ui/app.css" />
</head>
<body>
  <main id="app" class="app">
    <section id="home" class="home screen active">
      <div id="homeBg" class="home-bg"></div>
      <div class="home-shade"></div>
      <div class="home-inner">
        <div class="brand">
          <div class="mark">🏛️</div>
          <div class="eyebrow">CEN Bible 2.0</div>
          <h1>Temple Explorer</h1>
          <p>성막과 성전을 하나의 탐험관에서 걷습니다.</p>
        </div>
        <div id="projectGrid" class="project-grid"></div>
        <button id="installBtn" class="install-btn">PWA 설치하기</button>
      </div>
    </section>

    <section id="explorer" class="explorer screen" aria-label="Temple Explorer">
      <div id="stage" class="stage">
        <div id="blurBg" class="blur-bg"></div>
        <img id="sceneImage" class="scene-image" alt="" draggable="false" />
        <div class="shade"></div>
        <div id="fade" class="fade"></div>
        <div id="sceneFallback" class="scene-fallback hidden">
          <b>이미지 준비 중</b>
          <span>Scene 이미지를 해당 scenes 폴더에 넣으면 바로 표시됩니다.</span>
        </div>
      </div>

      <div id="ui" class="ui">
        <header id="topBar" class="top-bar">
          <button id="menuBtn" class="round" aria-label="메뉴">☰</button>
          <div class="title-box">
            <b id="sceneTitle">드론뷰</b>
            <span id="projectTitle">Temple Explorer</span>
          </div>
          <button id="homeBtn" class="round" aria-label="홈">⌂</button>
        </header>

        <div id="toast" class="toast">화면을 가볍게 탭하면 메뉴가 나타납니다.</div>

        <article id="desc" class="desc">
          <h2 id="descTitle">드론뷰</h2>
          <p id="descText"></p>
        </article>

        <nav class="next-box" aria-label="탐험 이동">
          <button id="prevBtn" class="nav-btn">‹</button>
          <button id="nextBtn" class="next-btn">다음</button>
          <button id="nextIconBtn" class="nav-btn">›</button>
          <div id="sceneCounter" class="counter">1 / 8</div>
        </nav>
      </div>

      <aside id="bottomSheet" class="bottom-sheet" aria-label="장면 목록">
        <div class="sheet-head">
          <b id="sheetTitle">장면 목록</b>
          <button id="closeSheetBtn" class="round small" aria-label="닫기">×</button>
        </div>
        <div id="sceneList" class="scene-list"></div>
        <div class="sheet-actions">
          <button id="autoBtn" class="sheet-action">자동탐험 ▶</button>
        </div>
      </aside>

      <div id="progress" class="progress"><i></i></div>
    </section>
  </main>

  <script src="./data/tabernacle.js"></script>
  <script src="./data/solomon.js"></script>
  <script src="./data/zerubbabel.js"></script>
  <script src="./data/herod.js"></script>
  <script src="./assets/engine/ui.js"></script>
  <script src="./assets/engine/story.js"></script>
  <script src="./assets/engine/transition.js"></script>
  <script src="./assets/engine/gesture.js"></script>
  <script src="./assets/engine/explorer.js"></script>
</body>
</html>
